        <h1>Цитати</h1>
        <p> A man likes to believe that he is the master of his soul. But as long as he is unable to control his moods and emotions, or to be conscious of the myriad secret ways in which unconscious factors insinuate themselves into his arrangements and decisions, he is certainly not his own master.
